services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - brimble-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATA_DIR=/app/data
      - WORKSPACE_DIR=/app/workspace
      - CADDY_ADMIN_URL=http://caddy:2019
      - PUBLIC_INGRESS_URL=http://localhost
      - DOCKER_HOST=unix:///var/run/docker.sock
      - BUILDKIT_HOST=docker-container://buildkit
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data:/app/data
      - ./workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - caddy
      - buildkit
    networks:
      - brimble-net

  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    privileged: true
    networks:
      - brimble-net

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - brimble-net
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

networks:
  brimble-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
